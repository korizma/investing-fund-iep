services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iep_auth
      POSTGRES_USER: iep_user
      POSTGRES_PASSWORD: iep_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iep_user -d iep_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./auth_service
    environment:
      DATABASE_URL: postgresql://iep_user:iep_password@postgres:5432/iep_auth
      JWT_SECRET_KEY: dev-secret
      FLASK_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  employee:
    build:
      context: ./employee_service
    environment:
      JWT_SECRET_KEY: dev-secret
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: iep_fund
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLASK_ENV: development
    ports:
      - "5001:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  director:
    build:
      context: ./director_service
    environment:
      JWT_SECRET_KEY: dev-secret
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: iep_fund
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLASK_ENV: development
    ports:
      - "5002:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
