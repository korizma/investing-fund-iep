services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iep_auth
      POSTGRES_USER: iep_user
      POSTGRES_PASSWORD: iep_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iep_user -d iep_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ./auth_service
    environment:
      DATABASE_URL: postgresql://iep_user:iep_password@postgres:5432/iep_auth
      JWT_SECRET_KEY: dev-secret
      FLASK_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
