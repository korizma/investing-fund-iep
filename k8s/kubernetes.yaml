apiVersion: v1
kind: ConfigMap
metadata:
  name: fund-config
data:
  MONGO_URI: mongodb://mongo:27017
  MONGO_DATABASE: iep_fund
  REDIS_URL: redis://redis:6379/0
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  GANACHE_PROVIDER_URL: http://ganache:8545
  FLASK_ENV: development

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  JWT_SECRET_KEY: super-secret-key-change-in-production
  DATABASE_URL: postgresql://iep_user:iep_password@postgres:5432/iep_auth

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: iep_auth
  POSTGRES_USER: iep_user
  POSTGRES_PASSWORD: iep_password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels: 
        app: postgres
      
    spec:
      containers:
        - name: postgres
          image: postgres:17

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - iep_user
                - -d
                - iep_auth
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels: 
        app: mongo
      
    spec:
      containers:
        - name: mongo
          image: mongo:7

          ports:
            - containerPort: 27017

          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand('ping').ok
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector:
    app: mongo
  
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels: 
        app: redis
      
    spec:
      containers:
        - name: redis
          image: redis:7-alpine

          ports:
            - containerPort: 6379

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ganache
spec:
  replicas: 1

  selector:
    matchLabels:
      app: ganache

  template:
    metadata:
      labels:
        app: ganache
      
    spec:
      containers:
        - name: ganache
          image: trufflesuite/ganache-cli:latest

          ports:
            - containerPort: 8545

          args:
            - --host
            - 0.0.0.0

---
apiVersion: v1
kind: Service
metadata:
  name: ganache
spec:
  selector:
    app: ganache
  
  ports:
    - port: 8545
      targetPort: 8545

  

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-app
spec:
  replicas: 3

  selector:
    matchLabels: 
      app: auth-service-app

  template:
    metadata:
      labels:
        app: auth-service-app

    spec:
      containers:
        - name: auth-service-app
          image: iep-auth:v1
          
          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: fund-config
            - secretRef:
                name: app-secret

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-app
spec:
  selector:
    app: auth-service-app
  
  ports:
    - port: 5000
      targetPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service-app
spec:
  replicas: 1

  selector:
    matchLabels: 
      app: employee-service-app

  template:
    metadata:
      labels:
        app: employee-service-app

    spec:
      containers:
        - name: employee-service-app
          image: iep-employee:v1
          
          ports:
            - containerPort: 5001

          envFrom:
            - configMapRef:
                name: fund-config
            - secretRef:
                name: app-secret

---
apiVersion: v1
kind: Service
metadata:
  name: employee-service-app
spec:
  selector:
    app: employee-service-app
  
  ports:
    - port: 5001
      targetPort: 5001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: director-service-app
spec:
  replicas: 1

  selector:
    matchLabels: 
      app: director-service-app

  template:
    metadata:
      labels:
        app: director-service-app

    spec:
      containers:
        - name: director-service-app
          image: iep-director:v1
          
          ports:
            - containerPort: 5002

          envFrom:
            - configMapRef:
                name: fund-config
            - secretRef:
                name: app-secret

---
apiVersion: v1
kind: Service
metadata:
  name: director-service-app
spec:
  selector:
    app: director-service-app
  
  ports:
    - port: 5002
      targetPort: 5002